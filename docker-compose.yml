version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: opsdesk_postgres
    environment:
      POSTGRES_DB: opsdesk
      POSTGRES_USER: opsdesk
      POSTGRES_PASSWORD: opsdesk_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsdesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: opsdesk_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ML Training (one-shot) ──────────────────────────────────────────────────
  ml_trainer:
    build:
      context: .
      dockerfile: docker/Dockerfile.ml
    container_name: opsdesk_ml_trainer
    volumes:
      - ./data:/app/data
      - ./ml:/app/ml
    command: >
      sh -c "python ml/data_pipeline.py && python ml/train.py"
    profiles:
      - train

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: opsdesk_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://opsdesk:opsdesk_secret@postgres:5432/opsdesk
      REDIS_URL: redis://redis:6379/0
      MODELS_DIR: /app/ml/models
      DATA_DIR: /app/data/processed
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./ml/models:/app/ml/models:ro
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: opsdesk_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: opsdesk_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
